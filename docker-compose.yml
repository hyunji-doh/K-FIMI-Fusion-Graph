# ============================================
# K-FIMI Fusion Graph - Docker Compose
# ============================================

version: '3.8'

services:
  # ==========================================
  # K-FIMI API 서버
  # ==========================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: k-fimi-fusion-graph:latest
    container_name: k-fimi-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      - API_HOST=0.0.0.0
      - API_PORT=8000
      # 데이터베이스 연결 (선택사항)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=k_fimi
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - k-fimi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # PostgreSQL 데이터베이스
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: k-fimi-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/postgres/sample_data.sql:/docker-entrypoint-initdb.d/02-sample.sql
    environment:
      - POSTGRES_DB=k_fimi
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    networks:
      - k-fimi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Neo4j 그래프 데이터베이스
  # ==========================================
  neo4j:
    image: neo4j:5.15-community
    container_name: k-fimi-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./db/neo4j:/import
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    networks:
      - k-fimi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis 캐시
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: k-fimi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - k-fimi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Jupyter Lab (개발/분석용)
  # ==========================================
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: k-fimi-jupyter
    ports:
      - "8888:8888"
    volumes:
      - .:/app
      - ./notebooks:/app/notebooks
    environment:
      - PYTHONPATH=/app
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
      --NotebookApp.password=''
    networks:
      - k-fimi-network
    profiles:
      - dev

# ==========================================
# GPU 버전 API 서버
# docker compose --profile gpu up -d
# ==========================================
  api-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: k-fimi-fusion-graph:gpu
    container_name: k-fimi-api-gpu
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
    environment:
      - PYTHONPATH=/app
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - k-fimi-network
    profiles:
      - gpu

# ==========================================
# 네트워크
# ==========================================
networks:
  k-fimi-network:
    driver: bridge

# ==========================================
# 볼륨
# ==========================================
volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:

